name: Weekly integration

on:
  schedule:
    - cron: '00 12 * * 5'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      update: true

  trigger-test-dev:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: Trigger workflow on dev branch
        run: |
          gh workflow run weekly.yml --ref dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

